# docker-compose.yml (root) — v2 monorepo orchestration
include:
  - docker-compose.base.yml

services:
  # rag-pipeline services
  pipeline-api:
    build:
      context: .
      dockerfile: rag-pipeline/Dockerfile
    container_name: rag-pipeline-api
    command: uvicorn rag_pipeline.api.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  pipeline-worker:
    build:
      context: .
      dockerfile: rag-pipeline/Dockerfile
    container_name: rag-pipeline-worker
    command: celery -A rag_pipeline.tasks.celery_app worker --loglevel=info -Q pipeline --concurrency=2
    env_file: .env
    volumes:
      - ${DOC_WATCH_DIR:-/data/documents}:/data/documents:ro
      - ${EMBEDDING_MODEL_DIR:-/data/models/embedding}:/models/embedding:ro
      - ${IMAGE_STORE_DIR:-/data/images}:/data/images
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mineru-api:
    build:
      context: .
      dockerfile: Dockerfile.mineru
    container_name: rag-mineru-api
    env_file: .env
    ports:
      - "9000:9000"
    volumes:
      - ${DOC_WATCH_DIR:-/data/documents}:/data/documents:ro
      - ${MINERU_MODEL_DIR:-/data/models/mineru}:/root/.cache/mineru
      - ${IMAGE_STORE_DIR:-/data/images}:/data/images
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # rag-serving services
  serving-api:
    build:
      context: .
      dockerfile: rag-serving/Dockerfile.api
    container_name: rag-serving-api
    command: uvicorn rag_serving.api.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    env_file: .env
    volumes:
      - ${EMBEDDING_MODEL_DIR:-/data/models/embedding}:/models/embedding:ro
      - ${RERANKER_MODEL_DIR:-/data/models/reranker}:/models/reranker:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: rag-vllm
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-72B-Instruct-AWQ}
      --quantization ${VLLM_QUANTIZATION:-awq}
      --tensor-parallel-size ${VLLM_TENSOR_PARALLEL:-1}
      --gpu-memory-utilization ${VLLM_GPU_MEM_UTIL:-0.90}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-32768}
      --served-model-name ${VLLM_SERVED_MODEL_NAME:-qwen2.5-72b}
      --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ${VLLM_MODEL_DIR:-/data/models/vllm}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${VLLM_GPU_COUNT:-1}
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - gpu

  # rag-sync-monitor
  sync-scheduler:
    build:
      context: .
      dockerfile: rag-sync-monitor/Dockerfile
    container_name: rag-sync-scheduler
    command: python -m rag_sync_monitor.scheduler.cron_sync
    env_file: .env
    volumes:
      - ${DOC_WATCH_DIR:-/data/documents}:/data/documents:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  sync-dashboard:
    build:
      context: .
      dockerfile: rag-sync-monitor/Dockerfile
    container_name: rag-sync-dashboard
    command: streamlit run rag_sync_monitor/dashboard/app.py --server.port=8003 --server.headless=true
    ports:
      - "8003:8003"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8002}
    container_name: rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - serving-api
    restart: unless-stopped
