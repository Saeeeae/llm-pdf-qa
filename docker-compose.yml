services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_system}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-/data/db/postgres}:/var/lib/postgresql/data
      - ./app/db/init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - ${REDIS_DATA_DIR:-/data/db/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  mineru-api:
    build:
      context: .
      dockerfile: Dockerfile.mineru
      args:
        MINERU_PIP_SPEC: ${MINERU_PIP_SPEC:-mineru[all]}
        CUDA_INDEX: ${MINERU_CUDA_INDEX:-https://download.pytorch.org/whl/cu121}
    container_name: rag-mineru-api
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - MINERU_OUTPUT_DIR=/data/images/_mineru_tmp
    ports:
      - "9000:9000"
    volumes:
      - ${DOC_WATCH_DIR:-/data/documents}:/data/documents:ro
      - ${MINERU_MODEL_DIR:-/data/models/mineru}:/root/.cache/mineru
      - ${IMAGE_STORE_DIR:-/data/images}:/data/images
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: rag-api
    command: >
      uvicorn app.api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
    env_file: .env
    environment:
      - PYTHONPATH=/app
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${DOC_WATCH_DIR:-/data/documents}:/data/documents
      - ${EMBEDDING_MODEL_DIR:-/data/models/embedding}:/models/embedding:ro
      - ${IMAGE_STORE_DIR:-/data/images}:/data/images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mineru-api:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: rag-celery-worker
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      -Q default,ingest,sync
      --concurrency=2
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ${DOC_WATCH_DIR:-/data/documents}:/data/documents:ro
      - ${EMBEDDING_MODEL_DIR:-/data/models/embedding}:/models/embedding:ro
      - ${IMAGE_STORE_DIR:-/data/images}:/data/images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mineru-api:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.beat
    container_name: rag-celery-beat
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
    env_file: .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: rag-vllm
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-72B-Instruct-AWQ}
      --quantization ${VLLM_QUANTIZATION:-awq}
      --tensor-parallel-size ${VLLM_TENSOR_PARALLEL:-1}
      --gpu-memory-utilization ${VLLM_GPU_MEM_UTIL:-0.90}
      --max-model-len ${VLLM_MAX_MODEL_LEN:-32768}
      --served-model-name ${VLLM_SERVED_MODEL_NAME:-qwen2.5-72b}
      --host 0.0.0.0
      --port 8001
    ports:
      - "8001:8001"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ${VLLM_MODEL_DIR:-/data/models/vllm}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${VLLM_GPU_COUNT:-1}
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - gpu

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
