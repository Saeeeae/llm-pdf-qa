services:
  sync-scheduler:
    build:
      context: ..
      dockerfile: rag-sync-monitor/Dockerfile
    container_name: rag-sync-scheduler
    command: python -m rag_sync_monitor.scheduler.cron_sync
    env_file: ../.env
    volumes:
      - ${DOC_WATCH_DIR:-/data/documents}:/mnt/nas/documents:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  sync-dashboard:
    build:
      context: ..
      dockerfile: rag-sync-monitor/Dockerfile
    container_name: rag-sync-dashboard
    command: streamlit run rag_sync_monitor/dashboard/app.py --server.port=8003 --server.headless=true
    ports:
      - "8003:8003"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
